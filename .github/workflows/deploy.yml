name: Deploy to production branch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve dist directory
        id: dist
        run: |
          if [ -d "src/dist" ]; then
            echo "path=src/dist" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist" >> "$GITHUB_OUTPUT"
          fi

      - name: Flatten build output
        run: |
          DIST="${{ steps.dist.outputs.path }}"
          # Move _astro/ contents to root and rewrite all references to them
          if [ -d "$DIST/_astro" ]; then
            mv "$DIST/_astro/"* "$DIST/"
            rmdir "$DIST/_astro"
            find "$DIST" -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) \
              -exec sed -i 's|/_astro/|/|g' {} +
          fi

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.dist.outputs.path }}
          publish_branch: production
          force_orphan: true
          enable_jekyll: true
