name: Deploy to production branch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve dist directory
        id: dist
        run: |
          if [ -d "src/dist" ]; then
            echo "path=src/dist" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist" >> "$GITHUB_OUTPUT"
          fi

      - name: Flatten build output
        env:
          DIST: ${{ steps.dist.outputs.path }}
        run: |
          python3 << 'EOF'
          import os, shutil

          dist = os.environ['DIST']
          moves = {}

          for root, dirs, files in os.walk(dist):
              if root == dist:
                  continue
              for f in files:
                  src = os.path.join(root, f)
                  rel = os.path.relpath(src, dist)           # e.g. _astro/main.js or event/1.html
                  flat = rel.replace(os.sep, '-')            # e.g. _astro-main.js or event-1.html
                  moves[rel] = flat

          for rel, flat in moves.items():
              os.rename(os.path.join(dist, rel), os.path.join(dist, flat))

          for fname in os.listdir(dist):
              if not any(fname.endswith(e) for e in ('.html', '.css', '.js')):
                  continue
              path = os.path.join(dist, fname)
              content = open(path, encoding='utf-8', errors='ignore').read()
              for rel, flat in moves.items():
                  rel_fwd = rel.replace(os.sep, '/')
                  rel_no_ext = os.path.splitext(rel_fwd)[0]
                  content = content.replace('/' + rel_fwd, '/' + flat)
                  content = content.replace('/' + rel_no_ext + '"', '/' + flat + '"')
                  content = content.replace('/' + rel_no_ext + "'", '/' + flat + "'")
              open(path, 'w', encoding='utf-8').write(content)

          for entry in os.listdir(dist):
              if os.path.isdir(os.path.join(dist, entry)):
                  shutil.rmtree(os.path.join(dist, entry))

          print('Flattened:', sorted(moves.values()))
          EOF

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.dist.outputs.path }}
          publish_branch: production
          force_orphan: true
          enable_jekyll: true
