name: Deploy to production branch

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve dist directory
        id: dist
        run: |
          if [ -d "src/dist" ]; then
            echo "path=src/dist" >> "$GITHUB_OUTPUT"
          else
            echo "path=dist" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to production branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.dist.outputs.path }}
          publish_branch: production
          force_orphan: true
          enable_jekyll: true
