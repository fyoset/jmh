<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JMH</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="nav">
    <a href="#" class="logo">JMH</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#band">The Band</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <section id="hero">
    <div class="hero-content">
      <h1>JMH</h1>
      <p class="tagline">Rocks</p>
    </div>
  </section>

  <section id="band">
    <p class="section-label">The Band</p>
    <div class="members">
      <div class="member">
        <div class="member-initial">Edward</div>
        <h3>Guitar</h3>
      </div>

        <div class="member-initial">DDR</div>
        <h3>Keys &amp; Vocals</h3>
      </div>
      <div class="member">
        <div class="member-initial">Dino</div>
        <h3>Drums</h3>
      </div>
    </div>
  </section>

  <footer id="contact">
    <p class="footer-logo">JMH</p>
    <p class="footer-copy">&copy; 2025 JMH</p>
  </footer>

  <script src="script.js"></script>

</html>
